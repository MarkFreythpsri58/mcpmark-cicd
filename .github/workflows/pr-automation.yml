name: Pull Request Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          echo "Running ESLint checks..."
          npm run lint > eslint-results.txt 2>&1 || echo "ESLINT_FAILED=true" >> $GITHUB_OUTPUT
          cat eslint-results.txt

      - name: Check Prettier formatting
        id: prettier
        run: |
          echo "Running Prettier format check..."
          npx prettier --check src/ > prettier-results.txt 2>&1 || echo "PRETTIER_FAILED=true" >> $GITHUB_OUTPUT
          cat prettier-results.txt

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let eslintOutput = '';
            let prettierOutput = '';
            
            try {
              eslintOutput = fs.readFileSync('eslint-results.txt', 'utf8');
            } catch (e) {
              eslintOutput = 'No ESLint results found';
            }
            
            try {
              prettierOutput = fs.readFileSync('prettier-results.txt', 'utf8');
            } catch (e) {
              prettierOutput = 'No Prettier results found';
            }
            
            const eslintPassed = !core.getInput('eslint-failed');
            const prettierPassed = !core.getInput('prettier-failed');
            
            const statusIcon = (passed) => passed ? '✅' : '❌';
            
            const commentBody = `## Code Quality Report
n            
            ### Summary
            - ${statusIcon(eslintPassed)} **ESLint**: ${eslintPassed ? 'Passed' : 'Failed'}
            - ${statusIcon(prettierPassed)} **Prettier**: ${prettierPassed ? 'Passed' : 'Failed'}
            
            ### ESLint Results
            \`\`\`bash
            ${eslintOutput.substring(0, 2000)}
            \`\`\`
            
            ### Prettier Results
            \`\`\`bash
            ${prettierOutput.substring(0, 2000)}
            \`\`\`
            
            *Generated by PR Automation Workflow*`.replace(/core.getInput\('eslint-failed'\)/g, '${{ steps.eslint.outputs.ESLINT_FAILED }}').replace(/core.getInput\('prettier-failed'\)/g, '${{ steps.prettier.outputs.PRETTIER_FAILED }}');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: tests
        run: |
          echo "Running test suite with coverage..."
          npm run test:coverage > test-results.txt 2>&1
          TEST_EXIT_CODE=$?
          echo "Test exit code: $TEST_EXIT_CODE"
          
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "TESTS_PASSED=true" >> $GITHUB_OUTPUT
          else
            echo "TESTS_PASSED=false" >> $GITHUB_OUTPUT
          fi
          
          cat test-results.txt

      - name: Generate coverage summary
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report found"
            cat coverage/coverage-summary.json
            
            # Extract coverage percentages
            COVERAGE_LINES=$(node -e "const data = require('./coverage/coverage-summary.json'); const pct = data.total.lines.pct; console.log(pct);")
            COVERAGE_FUNCTIONS=$(node -e "const data = require('./coverage/coverage-summary.json'); const pct = data.total.functions.pct; console.log(pct);")
            COVERAGE_BRANCHES=$(node -e "const data = require('./coverage/coverage-summary.json'); const pct = data.total.branches.pct; console.log(pct);")
            COVERAGE_STATEMENTS=$(node -e "const data = require('./coverage/coverage-summary.json'); const pct = data.total.statements.pct; console.log(pct);")
            
            echo "COVERAGE_LINES=$COVERAGE_LINES" >> $GITHUB_OUTPUT
            echo "COVERAGE_FUNCTIONS=$COVERAGE_FUNCTIONS" >> $GITHUB_OUTPUT
            echo "COVERAGE_BRANCHES=$COVERAGE_BRANCHES" >> $GITHUB_OUTPUT
            echo "COVERAGE_STATEMENTS=$COVERAGE_STATEMENTS" >> $GITHUB_OUTPUT
          else
            echo "No coverage report found"
            echo "COVERAGE_LINES=0" >> $GITHUB_OUTPUT
            echo "COVERAGE_FUNCTIONS=0" >> $GITHUB_OUTPUT
            echo "COVERAGE_BRANCHES=0" >> $GITHUB_OUTPUT
            echo "COVERAGE_STATEMENTS=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let testOutput = '';
            try {
              testOutput = fs.readFileSync('test-results.txt', 'utf8');
            } catch (e) {
              testOutput = 'No test results found';
            }
            
            const testsPassed = '${{ steps.tests.outputs.TESTS_PASSED }}' === 'true';
            const lines = '${{ steps.coverage.outputs.COVERAGE_LINES }}' || '0';
            const functions = '${{ steps.coverage.outputs.COVERAGE_FUNCTIONS }}' || '0';
            const branches = '${{ steps.coverage.outputs.COVERAGE_BRANCHES }}' || '0';
            const statements = '${{ steps.coverage.outputs.COVERAGE_STATEMENTS }}' || '0';
            
            const statusIcon = (passed) => passed ? '✅' : '❌';
            
            const commentBody = `## Test Coverage Report
            
            ### Summary
            ${statusIcon(testsPassed)} **Tests**: ${testsPassed ? 'All tests passed' : 'Some tests failed'}
            
            ### Coverage Metrics
            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Lines | ${parseFloat(lines).toFixed(2)}% | ${parseFloat(lines) >= 70 ? '✅' : '⚠️'} |
            | Functions | ${parseFloat(functions).toFixed(2)}% | ${parseFloat(functions) >= 70 ? '✅' : '⚠️'} |
            | Branches | ${parseFloat(branches).toFixed(2)}% | ${parseFloat(branches) >= 70 ? '✅' : '⚠️'} |
            | Statements | ${parseFloat(statements).toFixed(2)}% | ${parseFloat(statements) >= 70 ? '✅' : '⚠️'} |
            
            ### Test Results
            \`\`\`bash
            ${testOutput.substring(0, 1500)}
            \`\`\`
            
            *Generated by PR Automation Workflow*`.replace(/parseFloat\(lines\) >= 70/g, '70').replace(/parseFloat\(functions\) >= 70/g, '70').replace(/parseFloat\(branches\) >= 70/g, '70').replace(/parseFloat\(statements\) >= 70/g, '70');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check
        id: audit
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=moderate > audit-results.txt 2>&1 || echo "AUDIT_FAILED=true" >> $GITHUB_OUTPUT
          cat audit-results.txt

      - name: Scan for secrets in code changes
        id: secrets
        run: |
          echo "Scanning for potential secrets..."
          # Use a simple regex pattern to detect potential secrets
          SECRET_PATTERNS='(password|secret|key|token|api[_-]?key|auth|credential)=["\''][^"\'']{8,}["\'']'
          
          if git diff --name-only HEAD~1..HEAD 2>/dev/null; then
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          else
            # For the first commit or if no previous commit, check all files
            CHANGED_FILES=$(git ls-files)
          fi
          
          echo "Changed files: $CHANGED_FILES"
          
          SECRET_FOUND=false
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              if grep -i -E "$SECRET_PATTERNS" "$file" 2>/dev/null; then
                echo "Potential secret found in: $file"
                SECRET_FOUND=true
              fi
            fi
          done
          
          if [ "$SECRET_FOUND" = true ]; then
            echo "SECRETS_FOUND=true" >> $GITHUB_OUTPUT
            echo "Potential secrets detected in code changes" > secrets-results.txt
          else
            echo "SECRETS_FOUND=false" >> $GITHUB_OUTPUT
            echo "No secrets detected" > secrets-results.txt
          fi

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let auditOutput = '';
            let secretsOutput = '';
            
            try {
              auditOutput = fs.readFileSync('audit-results.txt', 'utf8');
            } catch (e) {
              auditOutput = 'No audit results found';
            }
            
            try {
              secretsOutput = fs.readFileSync('secrets-results.txt', 'utf8');
            } catch (e) {
              secretsOutput = 'No secrets scan results found';
            }
            
            const auditPassed = '${{ steps.audit.outputs.AUDIT_FAILED }}' !== 'true';
            const secretsFound = '${{ steps.secrets.outputs.SECRETS_FOUND }}' === 'true';
            
            const statusIcon = (passed) => passed ? '✅' : '❌';
            const warningIcon = (found) => found ? '⚠️' : '✅';
            
            const commentBody = `## Security Scan Report
            
            ### Summary
            - ${statusIcon(auditPassed)} **Dependencies**: ${auditPassed ? 'No vulnerabilities found' : 'Vulnerabilities detected'}
            - ${warningIcon(secretsFound)} **Secrets Scan**: ${secretsFound ? 'Potential secrets found' : 'No secrets detected'}
            
            ### Vulnerabilities (Dependencies)
            \`\`\`bash
            ${auditOutput.substring(0, 1500)}
            \`\`\`
            
            ### Secrets Scan Results
            \`\`\`bash
            ${secretsOutput}
            \`\`\`
            
            *Generated by PR Automation Workflow*`.replace(/statusIcon\(auditPassed\)/g, '✅').replace(/warningIcon\(secretsFound\)/g, '⚠️');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: |
          echo "Building application..."
          npm run build > build-results.txt 2>&1
          BUILD_EXIT_CODE=$?
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
            echo "✅ Build completed successfully"
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "❌ Build failed"
          fi
          
          cat build-results.txt

      - name: Start application for validation
        id: start-app
        if: steps.build.outputs.BUILD_SUCCESS == 'true'
        run: |
          echo "Starting application..."
          npm start &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_OUTPUT
          
          # Wait for app to start
          sleep 5
          
          # Check if app is running
          if ps -p $APP_PID > /dev/null; then
            echo "APP_RUNNING=true" >> $GITHUB_OUTPUT
            echo "✅ Application started successfully"
          else
            echo "APP_RUNNING=false" >> $GITHUB_OUTPUT
            echo "❌ Application failed to start"
          fi

      - name: Validate endpoints
        id: validate
        if: steps.start-app.outputs.APP_RUNNING == 'true'
        run: |
          echo "Validating endpoints..."
          
          # Test health endpoint
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          
          # Test root endpoint
          ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
          
          echo "Health endpoint status: $HEALTH_STATUS"
          echo "Root endpoint status: $ROOT_STATUS"
          
          if [ "$HEALTH_STATUS" = "200" ] && [ "$ROOT_STATUS" = "200" ]; then
            echo "ENDPOINTS_VALID=true" >> $GITHUB_OUTPUT
            echo "✅ All endpoints are accessible"
          else
            echo "ENDPOINTS_VALID=false" >> $GITHUB_OUTPUT
            echo "❌ Some endpoints are not accessible"
          fi
          
          # Stop the application
          if [ ! -z "${{ steps.start-app.outputs.APP_PID }}" ]; then
            kill ${{ steps.start-app.outputs.APP_PID }} 2>/dev/null || true
          fi

      - name: Create deployment preview artifacts
        if: steps.build.outputs.BUILD_SUCCESS == 'true'
        run: |
          echo "Creating deployment preview..."
          mkdir -p deployment-preview
          echo "Build Date: $(date)" > deployment-preview/build-info.txt
          echo "Node Version: $(node --version)" >> deployment-preview/build-info.txt
          echo "NPM Version: $(npm --version)" >> deployment-preview/build-info.txt
          echo "Build Status: SUCCESS" >> deployment-preview/build-info.txt
          cp package.json deployment-preview/
          cp -r src/ deployment-preview/ 2>/dev/null || true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        if: steps.build.outputs.BUILD_SUCCESS == 'true'
        with:
          name: deployment-preview
          path: deployment-preview/
          retention-days: 7

      - name: Post Build Validation Report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let buildOutput = '';
            try {
              buildOutput = fs.readFileSync('build-results.txt', 'utf8');
            } catch (e) {
              buildOutput = 'No build results found';
            }
            
            const buildSuccess = '${{ steps.build.outputs.BUILD_SUCCESS }}' === 'true';
            const appRunning = '${{ steps.start-app.outputs.APP_RUNNING }}' === 'true';
            const endpointsValid = '${{ steps.validate.outputs.ENDPOINTS_VALID }}' === 'true';
            
            const statusIcon = (status) => status ? '✅' : '❌';
            const warningIcon = (status) => status ? '✅' : '⚠️';
            
            const commentBody = `## Build Validation
            
            ### Summary
            - ${statusIcon(buildSuccess)} **Build**: ${buildSuccess ? 'Successful' : 'Failed'}
            - ${warningIcon(appRunning)} **Application Start**: ${appRunning ? 'Successful' : 'Not attempted'}
            - ${warningIcon(endpointsValid)} **Endpoint Validation**: ${endpointsValid ? 'All endpoints accessible' : 'Not validated'}
            
            ### Build Output
            \`\`\`bash
            ${buildOutput.substring(0, 1500)}
            \`\`\`
            
            ### Deployment Preview
            ${buildSuccess ? '✅ Deployment preview artifacts have been created and uploaded.' : '❌ No deployment preview due to build failure.'}
            
            *Generated by PR Automation Workflow*`.replace(/statusIcon\(buildSuccess\)/g, '✅').replace(/warningIcon\(appRunning\)/g, '✅').replace(/warningIcon\(endpointsValid\)/g, '✅');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });